version: '3.9'

services:
  app:
    build: .
    container_name: inventory-api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      # Variables de BD apuntan a Supabase (nube) — no hay contenedor de postgres
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
    # Lee variables del archivo .env automáticamente
    env_file:
      - .env
    restart: unless-stopped